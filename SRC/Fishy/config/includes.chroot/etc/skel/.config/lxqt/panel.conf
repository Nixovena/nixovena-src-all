[General]
iconTheme=Papirus-Dark

[fancymenu2]
alignment=Left
autoSel=false
customFont=false
icon=/usr/share/icons/fishy.png
ownIcon=true
showText=false
type=fancymenu

[mount]
alignment=Right
type=mount

[panel1]
alignment=-1
animation-duration=0
background-color=
background-image=
desktop=0
font-color=
hidable=false
hide-on-overlap=false
iconSize=22
lineCount=1
lockPanel=false
opacity=95
panelSize=32
plugins=fancymenu2, quicklaunch, taskbar, tray, statusnotifier, volume, worldclock
position=Bottom
reserve-space=true
show-delay=0
visible-margin=true
width=100
width-percent=true

[quicklaunch]
alignment=Left
apps\1\desktop=/usr/share/applications/firefox-esr.desktop
apps\2\desktop=/usr/share/applications/pcmanfm-qt.desktop
apps\3\desktop=/usr/share/applications/qterminal.desktop
apps\size=3
type=quicklaunch

[statusnotifier]
alignment=Right
type=statusnotifier

[taskbar]
alignment=Left
type=taskbar

[tray]
alignment=Right
type=tray

[volume]
alignment=Right
type=volume

[worldclock]
alignment=Right
type=worldclock
timeShowSeconds=true