# Hardened Process and Resource Limits (Desktop Optimized)

# Core dumps: Completely disabled to prevent information leaks after crashes.
*               hard    core            0
*               soft    core            0

# Number of processes: Increased for modern multi-process browsers (Chrome/Firefox).
*               hard    nproc           4096
*               soft    nproc           2048
root            hard    nproc           65536
root            soft    nproc           32768

# Max open files: Standard high limit for modern app requirements.
*               hard    nofile          65536
*               soft    nofile          32768

# Stack size: Standard 8MB, helps mitigate certain overflow attacks.
*               hard    stack           8192
*               soft    stack           8192

# Memory Locking: Slightly increased for apps that might need it (e.g., GPG, Browser).
*               hard    memlock         1024
*               soft    memlock         512

# Maximum logins: Limit simultaneous sessions per user.
*               hard    maxlogins       10
*               soft    maxlogins       5

# Maximum file size: Unlimited for standard desktop use (downloads, etc).
*               hard    fsize           unlimited
*               soft    fsize           unlimited

# Nice priority: Prevent users from increasing process priority.
# *               hard    nice            0
# *               soft    nice            0

# Realtime priority: Disabled for standard users.
# *               hard    rtprio          0
# *               soft    rtprio          0


# Address space: Increased to 16GB to support modern browser sandboxing. 
# debug note: firefox and chromium will crash because of this
# Values in KB.
# *               hard    as              16777216
# *               soft    as              12582912

# Pending signals: Limit the signal queue.
*               hard    sigpending      2048
*               soft    sigpending      1024

# Message Queues: Limit POSIX message queue size.
*               hard    msgqueue        819200
*               soft    msgqueue        819200
