#!/usr/sbin/nft -f

# HardenedSlarpx Firewall
flush ruleset

# Service port definitions
define SSH_PORT = 22
define HTTP_PORT = 80
define HTTPS_PORT = 443
define DNS_PORT = 53
define NTP_PORT = 123
define DHCP_CLIENT_PORT = 68
define DHCP_SERVER_PORT = 67
define DHCPV6_CLIENT_PORT = 546
define DHCPV6_SERVER_PORT = 547

# Trusted DNS servers # note: slarpx uses quad9 for security reasons
define TRUSTED_DNS_V4 = { 1.1.1.1, 1.0.0.1, 8.8.8.8, 8.8.4.4, 9.9.9.9 }
define TRUSTED_DNS_V6 = { 2606:4700:4700::1111, 2606:4700:4700::1001, 2001:4860:4860::8888, 2001:4860:4860::8844 }


table inet filter {
    # SSH brute force tracking (IPv4)
    set ssh_ratelimit_v4 {
        type ipv4_addr
        flags dynamic, timeout
        timeout 10m
    }

    # SSH brute force tracking (IPv6)
    set ssh_ratelimit_v6 {
        type ipv6_addr
        flags dynamic, timeout
        timeout 10m
    }

    chain input {
        type filter hook input priority filter; policy drop;

        # Performance: Accept established/related first (most traffic)
        ct state established,related accept comment "Accept established connections"
        
        # Drop invalid packets early
        ct state invalid counter drop comment "Drop invalid packets"

        # Loopback - full trust
        iif lo accept comment "Accept all loopback"
        
        # Anti-spoofing: Drop loopback addresses from non-loopback interfaces
        iif != lo ip saddr 127.0.0.0/8 counter drop comment "Drop spoofed loopback IPv4"
        iif != lo ip6 saddr ::1/128 counter drop comment "Drop spoofed loopback IPv6"

        # ICMPv4 - Essential types with reasonable rate limiting
        ip protocol icmp icmp type {
            echo-reply,
            echo-request,
            destination-unreachable,
            time-exceeded,
            parameter-problem
        } limit rate 20/second burst 30 packets accept comment "Accept ICMPv4"

        # Accept IGMP (Multicast management)
        ip protocol igmp accept comment "Accept IGMP"

        # ICMPv6 - Critical for IPv6 functionality
        ip6 nexthdr icmpv6 icmpv6 type {
            destination-unreachable,
            packet-too-big,
            time-exceeded,
            parameter-problem,
            echo-request,
            echo-reply,
            nd-router-solicit,
            nd-router-advert,
            nd-neighbor-solicit,
            nd-neighbor-advert,
            nd-redirect,
            mld-listener-query,
            mld-listener-report,
            mld-listener-done
        } limit rate 20/second burst 30 packets accept comment "Accept ICMPv6"

        # Anti-scan protection (but less aggressive to avoid false positives)
        tcp flags & (fin|syn|rst|psh|ack|urg) == fin|syn|rst|psh|ack|urg counter drop comment "Drop XMAS scan"
        tcp flags & (fin|syn|rst|psh|ack|urg) == 0x0 counter drop comment "Drop NULL scan"
        tcp flags & (fin|syn) == fin|syn counter drop comment "Drop SYN-FIN scan"
        tcp flags & (syn|rst) == syn|rst counter drop comment "Drop SYN-RST scan"
        
        # Drop packets with invalid TCP flags
        tcp flags & (fin|psh|urg) == fin|psh|urg counter drop comment "Drop FIN-PSH-URG"

        # SYN flood protection (more permissive)
        # Note: MSS check disabled - can cause false positives with legitimate servers
        # tcp flags syn tcp option maxseg size 1-535 counter drop comment "Drop suspicious MSS"
        tcp flags syn limit rate over 30/second burst 50 packets counter drop comment "SYN flood protection"

        # SSH with brute-force protection (IPv4)
        ip saddr @ssh_ratelimit_v4 tcp dport $SSH_PORT counter drop comment "Drop IPv4 SSH brute-force"
        tcp dport $SSH_PORT ct state new limit rate 3/minute burst 5 packets accept comment "SSH IPv4 rate limited"
        tcp dport $SSH_PORT ct state new add @ssh_ratelimit_v4 { ip saddr } counter drop comment "Drop excessive SSH IPv4 and ban"

        # SSH with brute-force protection (IPv6)
        ip6 saddr @ssh_ratelimit_v6 tcp dport $SSH_PORT counter drop comment "Drop IPv6 SSH brute-force"
        tcp dport $SSH_PORT ct state new limit rate 3/minute burst 5 packets accept comment "SSH IPv6 rate limited"
        tcp dport $SSH_PORT ct state new add @ssh_ratelimit_v6 { ip6 saddr } counter drop comment "Drop excessive SSH IPv6 and ban"

        # HTTP/HTTPS - Uncomment if running a web server
        # tcp dport { $HTTP_PORT, $HTTPS_PORT } ct state new accept comment "HTTP/HTTPS"

        # NTP - Time synchronization (incoming responses only)
        udp sport $NTP_PORT accept comment "NTP responses"

        # DHCP client (IPv4)
        ip saddr 0.0.0.0 ip daddr 255.255.255.255 udp sport $DHCP_CLIENT_PORT udp dport $DHCP_SERVER_PORT accept comment "DHCP discovery"
        udp sport $DHCP_SERVER_PORT udp dport $DHCP_CLIENT_PORT accept comment "DHCP client"

        # DHCPv6 client (IPv6)
        ip6 saddr fe80::/10 udp sport $DHCPV6_SERVER_PORT udp dport $DHCPV6_CLIENT_PORT accept comment "DHCPv6 client"
        ip6 daddr fe80::/10 udp sport $DHCPV6_CLIENT_PORT udp dport $DHCPV6_SERVER_PORT accept comment "DHCPv6 request"

        # Accept link-local multicast (mDNS, LLMNR, etc. - prevent DDoS amplification)
        ip daddr 224.0.0.0/24 accept comment "Accept IPv4 link-local multicast only"
        ip6 daddr ff02::/16 accept comment "Accept IPv6 link-local multicast only"

        # Log dropped NEW connections (optional, for debugging)
        # ct state new limit rate 5/minute log prefix "nftables-drop: " level info

        # Default drop with counter
        counter drop comment "Drop all other input"
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        
        # Accept established/related
        ct state established,related accept comment "Accept established"
        
        # Drop invalid
        ct state invalid counter drop comment "Drop invalid"

        # If routing/NAT is needed, add rules here
        # Example: iifname "eth0" oifname "wlan0" accept

        # Default drop
        counter drop comment "Drop all forwarding"
    }

    chain output {
        type filter hook output priority filter; policy drop;
        
        # Accept established/related connections
        ct state established,related accept comment "Accept established"
        
        # Accept all loopback
        oif lo accept comment "Accept loopback"
        
        # Drop invalid packets
        ct state invalid counter drop comment "Drop invalid"

        # Allow local network communication (192.168.x.x, 10.x.x.x, etc.)
        # But block loopback spoofing from non-loopback interfaces
        oif != lo ip daddr 127.0.0.0/8 counter drop comment "Block loopback spoofing"
        oif != lo ip6 daddr ::1/128 counter drop comment "Block IPv6 loopback spoofing"

        # DNS - Policy: Try trusted first, but don't completely lock if you move between networks
        ip daddr $TRUSTED_DNS_V4 udp dport $DNS_PORT accept comment "DNS to trusted IPv4 servers"
        ip daddr $TRUSTED_DNS_V4 tcp dport $DNS_PORT accept comment "DNS TCP to trusted IPv4 servers"
        ip6 daddr $TRUSTED_DNS_V6 udp dport $DNS_PORT accept comment "DNS to trusted IPv6 servers"
        ip6 daddr $TRUSTED_DNS_V6 tcp dport $DNS_PORT accept comment "DNS TCP to trusted IPv6 servers"
        
        # Soft-block: Log then allow standard DNS as fallback (more compatible for mobile laptops)
        # If this is a fixed server, keep the 'drop' rule below active.
        # udp dport $DNS_PORT accept comment "Fallback DNS (for compatibility)"
        udp dport $DNS_PORT counter drop comment "Block DNS to untrusted servers"
        tcp dport $DNS_PORT counter drop comment "Block DNS TCP to untrusted servers"

        # NTP - Time synchronization
        udp dport $NTP_PORT accept comment "NTP"

        # DHCP client
        ip daddr 255.255.255.255 udp sport $DHCP_CLIENT_PORT udp dport $DHCP_SERVER_PORT accept comment "DHCP broadcast"
        udp sport $DHCP_CLIENT_PORT udp dport $DHCP_SERVER_PORT accept comment "DHCP client"
        ip6 daddr fe80::/10 udp sport $DHCPV6_CLIENT_PORT udp dport $DHCPV6_SERVER_PORT accept comment "DHCPv6 client"

        # HTTP/HTTPS - Web browsing
        tcp dport { $HTTP_PORT, $HTTPS_PORT } ct state new accept comment "HTTP/HTTPS"

        # QUIC/HTTP3 - Modern web browsing (UDP 443)
        udp dport $HTTPS_PORT ct state new accept comment "QUIC/HTTP3"

        # Email (SMTP, IMAP, POP3 with TLS)
        tcp dport { 587, 465, 993, 995 } ct state new accept comment "Email services"

        # SSH outbound (for client connections) 
        tcp dport $SSH_PORT ct state new accept comment "SSH client"

        # FTP (if needed, uncomment)
        # tcp dport { 20, 21 } ct state new accept comment "FTP"

        # Allow outbound ICMP (but rate limited to prevent abuse)
        ip protocol icmp limit rate 10/second burst 20 packets accept comment "ICMPv4 rate limited"
        ip6 nexthdr icmpv6 limit rate 10/second burst 20 packets accept comment "ICMPv6 rate limited"

        # mDNS outbound (link-local only)
        ip daddr 224.0.0.251 udp dport 5353 accept comment "mDNS IPv4 outbound"
        ip6 daddr ff02::fb udp dport 5353 accept comment "mDNS IPv6 outbound"

        # LLMNR outbound (link-local only)
        ip daddr 224.0.0.252 udp dport 5355 accept comment "LLMNR IPv4 outbound"
        ip6 daddr { ff02::1:3, ff02::fb } udp dport 5355 accept comment "LLMNR IPv6 outbound"

        # Log suspicious outbound attempts (optional - can cause log flooding)
        # ct state new limit rate 5/minute log prefix "nftables-egress-drop: " level warning

        # Default drop (prevent data exfiltration)
        counter drop comment "Drop all other outbound (anti-exfiltration)"
    }
}

