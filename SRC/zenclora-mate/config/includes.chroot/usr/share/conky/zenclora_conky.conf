conky.config = {
  background = true,
  update_interval = 2,

  cpu_avg_samples = 2,
  net_avg_samples = 2,
  no_buffers = true,
  double_buffer = true,
  text_buffer_size = 2048,
  use_spacer = "right",

  total_run_times = 0,
  gap_x = 24,
  gap_y = 64,

  minimum_width = 300,
  minimum_height = 0,
  maximum_width = 300,

  own_window = true,
  own_window_type = "dock",
  own_window_transparent = false,
  own_window_argb_visual = true,
  own_window_colour = "0f1423",
  own_window_argb_value = 110,
  own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",
  own_window_class = "Conky",
  own_window_title = "Zenclora Conky",

  alignment = "top_right",
  xinerama_head = 0,
  draw_shades = false,
