-- Converted to Lua 
conky.config = {
  background = true,
  update_interval = 2,

  cpu_avg_samples = 2,
  net_avg_samples = 2,
  no_buffers = true,
  double_buffer = true,
  text_buffer_size = 4096,
  use_spacer = "none",
  top_name_width = 16,

  total_run_times = 0,
  gap_x = 24,
  gap_y = 64,

  minimum_width = 300,
  minimum_height = 0,
  maximum_width = 300,

  own_window = true,
  own_window_type = "normal",
  own_window_transparent = false,
  own_window_argb_visual = true,
  own_window_colour = "121b2d", -- Soft Dark Blue
  own_window_argb_value = 160,  -- Premium transparency
  own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",
  own_window_class = "Conky",
  own_window_title = "Overkill Linux",

  alignment = "top_right",
  xinerama_head = 0,
  draw_shades = false,
  draw_outline = false,
  draw_borders = false,
  draw_graph_borders = false,
  stippled_borders = 0,

  border_margin = 8,
  border_width = 0,

  override_utf8_locale = true,
  use_xft = true,
  font = "Monospace:size=9",
  xftalpha = 0.9,
  uppercase = false,

  -- Soft Koyu Mavi (Soft Dark Blue) Theme
  default_color = "c0caf5",
  default_shade_color = "121b2d",
  default_outline_color = "c0caf5",

  color1 = "a9b1d6",
  color2 = "565f89",
  color3 = "3d59a1",
  color4 = "7aa2f7", -- Main Blue
  color5 = "89ddff", -- Soft Cyan
  color6 = "1d2433", -- Darker element for bars
  color7 = "ffd700", -- Gold for Title
}

conky.text = [[
${font Monospace:bold:size=11}${color7}Overkill Linux System${font}${color6}${hr 2}
${color}${font Monospace:size=9}
OS:${alignr}${execi 86400 awk -F'=' '/^NAME=/ {gsub(/"/,"",$2); print $2; exit}' /etc/os-release}
Edition:${alignr}${execi 10 cat /usr/share/edition/edition.conf 2>/dev/null | grep -Po '(?<=^EDITION=")[^"]*' | sed '/Mix/{s/Development/Dev/;s/Cryptocurrency/Crypto/;s/Multimedia/Media/;s/Hardened/Hardened/}; s/ Edition//' | cut -c1-22 | grep . || echo None}
Codename:${alignr}${execi 86400 awk -F'=' '/^VERSION_CODENAME=/ {gsub(/"/,"",$2); print $2; exit}' /etc/os-release}
Version:${alignr}${execi 86400 awk -F'=' '/^VERSION=|^VERSION_ID=/ {gsub(/"/,"",$2); print $2; exit}' /etc/os-release}
Kernel:${alignr}$kernel
Uptime:${alignr}$uptime
Machine:${alignr}$nodename
User:${alignr}${execi 60 whoami}
Time:${alignr}${time %H:%M}  -  ${time %d.%m.%Y}

${voffset 6}${font Monospace:bold:size=11}${color4}PERFORMANCE ${color6}${hr 2}
${color}${font Monospace:size=9}
CPU Usage:${alignr}${cpu}%
Freq:${alignr}${freq_g 1} GHz
CPU Temp:${alignr}${if_existing /sys/class/thermal/thermal_zone0/temp}${execi 10 awk '{printf("%.0f°C\n",$1/1000)}' /sys/class/thermal/thermal_zone0/temp}${else}${acpitemp}°C${endif}
${color4}${cpubar 6,280}${color}
Core 1: ${cpu cpu1}% ${alignr}Core 2: ${cpu cpu2}%
Core 3: ${cpu cpu3}% ${alignr}Core 4: ${cpu cpu4}%

Top CPU:
${color4}1)${color} ${top name 1}${alignr}${top cpu 1}%
${color4}2)${color} ${top name 2}${alignr}${top cpu 2}%
${color4}3)${color} ${top name 3}${alignr}${top cpu 3}%

${voffset 6}${font Monospace:bold:size=11}${color4}MEMORY ${color6}${hr 2}
${color}${font Monospace:size=9}
RAM:${alignr}$mem / $memmax ($memperc%)
${color5}${membar 6,280}${color}
Swap:${alignr}$swap / $swapmax ($swapperc%)
${color3}${swapbar 6,280}${color}

Top MEM:
${color5}1)${color} ${top_mem name 1}${alignr}${top_mem mem 1}%
${color5}2)${color} ${top_mem name 2}${alignr}${top_mem mem 2}%
${color5}3)${color} ${top_mem name 3}${alignr}${top_mem mem 3}%

${voffset 6}${font Monospace:bold:size=11}${color4}STORAGE ${color6}${hr 2}
${color}${font Monospace:size=9}
Root ( / ):${alignr}${fs_used /} / ${fs_size /}
${color4}${fs_bar 6,280 /}${color}
${if_existing /home}Home ( /home ):${alignr}${fs_used /home} / ${fs_size /home}
${color5}${fs_bar 6,280 /home}${color}${endif}
I/O Read:${alignr}${diskio_read}
I/O Write:${alignr}${diskio_write}

${voffset 6}${font Monospace:bold:size=11}${color4}NETWORK ${color6}${hr 2}
${color}${font Monospace:size=9}
${if_up wlp0s20f3}Interface:${alignr}wlp0s20f3
IP:${alignr}${addr wlp0s20f3}
Down:${alignr}${downspeedf wlp0s20f3} KiB/s
Up:${alignr}${upspeedf wlp0s20f3} KiB/s
${else}${if_up wlp2s0}Interface:${alignr}wlp2s0
IP:${alignr}${addr wlp2s0}
Down:${alignr}${downspeedf wlp2s0} KiB/s
Up:${alignr}${upspeedf wlp2s0} KiB/s
${else}${if_up wlp3s0}Interface:${alignr}wlp3s0
IP:${alignr}${addr wlp3s0}
Down:${alignr}${downspeedf wlp3s0} KiB/s
Up:${alignr}${upspeedf wlp3s0} KiB/s
${else}${if_up wlan0}Interface:${alignr}wlan0
IP:${alignr}${addr wlan0}
Down:${alignr}${downspeedf wlan0} KiB/s
Up:${alignr}${upspeedf wlan0} KiB/s
${else}${if_up enp0s3}Interface:${alignr}enp0s3
IP:${alignr}${addr enp0s3}
Down:${alignr}${downspeedf enp0s3} KiB/s
Up:${alignr}${upspeedf enp0s3} KiB/s
${else}${if_up enp3s0}Interface:${alignr}enp3s0
IP:${alignr}${addr enp3s0}
Down:${alignr}${downspeedf enp3s0} KiB/s
Up:${alignr}${upspeedf enp3s0} KiB/s
${else}${if_up eth0}Interface:${alignr}eth0
IP:${alignr}${addr eth0}
Down:${alignr}${downspeedf eth0} KiB/s
Up:${alignr}${upspeedf eth0} KiB/s
${else}
${color2}No active connection${color}
${endif}${endif}${endif}${endif}${endif}${endif}${endif}

${if_existing /sys/class/power_supply/BAT0}${voffset 6}${font Monospace:bold:size=11}${color4}BATTERY ${color6}${hr 2}
${color}${font Monospace:size=9}Status:${alignr}${battery_percent BAT0}% (${battery_status BAT0})
${color7}${battery_bar 6,280 BAT0}${color}
${endif}
]]